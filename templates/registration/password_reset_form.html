{% extends "partials/base.html" %}
{% load static %}

{% block content %}

<div class="container" style="margin-top:80px; margin-bottom:80px;">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <div style="border:1px solid #eee; padding:40px; background:#fff;">

                <h2 style="margin-bottom:20px;">Reset Your Password</h2>

                <p style="color:gray;">
                    Your Email Address Will Not Be Published. Required Fields Marked *
                </p>

                <form method="POST">
                    {% csrf_token %}

                    <div class="form-group">
                        <label>Email <span style="color:red;">*</span></label>
                        {{ form.email }}
                    </div>

                    {% comment %} <button type="submit" 
                            style="width:100%; background:black; color:white; padding:12px; margin-top:20px; border:none;">
                        Submit Now
                    </button> {% endcomment %}
                    <button type="submit" 
style="width:100%; background:black; color:white; height:45px; margin-top:20px; border:none; display:flex; align-items:center; justify-content:center;">
Submit Now
</button>

                </form>

                <p style="margin-top:20px;">
                    Back To? <a href="{% url 'userauths:sign-in' %}">Login</a>
                </p> 

            </div>

        </div>
    </div>
</div>

{% endblock %}
