{% extends "partials/base.html" %}
{% load static %}

{% block content %}

		<section class="flat-breadcrumb">
			<div class="container">
				<div class="row">
					<div class="col-md-12">
						<ul class="breadcrumbs">
							<li class="trail-item">
								<a href="#" title="">Home</a>
								<span><img src="{% static 'images/icons/arrow-right.png' %}" alt=""></span>
							</li>
							<li class="trail-item">
								<a href="#" title="">Shop</a>
								<span><img src="{% static 'images/icons/arrow-right.png' %}" alt=""></span>
							</li>
							<li class="trail-end">
								<a href="#" title="">Smartphones</a>
							</li>
						</ul><!-- /.breacrumbs -->
					</div><!-- /.col-md-12 -->
				</div><!-- /.row -->
			</div><!-- /.container -->
		</section><!-- /.flat-breadcrumb -->

		<section class="flat-error">
			<div class="container">
				<div class="row">
					<div class="col-md-2">
					</div><!-- /.col-md-2 -->
					<div class="col-md-8">
						<div class="wrap-error center">
							<div class="header-error">
								<img src="{% static 'images/banner_boxes/error.png' %}" alt="">
								<h1>Payment failed</h1>
								<p>try again later</p>
                                <button style="background-color: orange;">Back to home page</button>
							</div><!-- /.header-error -->
							<div class="content-error">
								<div class="form-search-error">
									<form action="#" method="get" accept-charset="utf-8">
										<div class="search-input">
											<input type="text" name="search" placeholder="Search">
											<button type="submit">Search</button>
										</div>
									</form>
								</div><!-- /.form-search-error -->
							</div><!-- /.content-error -->
						</div><!-- /.wrap-error -->
					</div><!-- /.col-md-8 -->
					<div class="col-md-2">
					</div><!-- /.col-md-2 -->
				</div><!-- /.row -->
			</div><!-- /.container -->
		</section><!-- /.flat-error -->
        {% endblock content %}
