{% comment %} {% extends "partials/base.html" %}
{% load static %}

{% block content %}

<section class="container" style="padding:60px 0;">

<div class="row justify-content-center">

<div class="col-lg-6">

<div class="card shadow-sm p-4">

<h2 class="text-center mb-4">Track Your Order</h2>

<form>

<div class="form-group mb-3">
<label>Enter Order ID</label>
<input type="text" class="form-control" placeholder="Example: ORD12345">
</div>

<button class="btn btn-warning w-100">
Track Order
</button>

</form>

<hr>

<h5 class="mt-4">Order Status</h5>

<ul>
<li>Order Placed ✔</li>
<li>Processing</li>
<li>Shipped</li>
<li>Out for Delivery</li>
<li>Delivered</li>
</ul>

<p class="mt-3">
Estimated Delivery Time: <strong>3-5 Days</strong>
</p>

</div>

</div>

</div>

</section>

{% endblock %} {% endcomment %}
